<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TouchLock – Fingerprint Browser Lock | Authenticate</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #0a0a14;
      color: #e4e4e7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .auth-card {
      text-align: center;
      max-width: 340px;
      width: 100%;
    }

    .icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 18px;
      color: #fff;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .desc {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      line-height: 1.5;
      margin-bottom: 28px;
    }

    #status {
      font-size: 14px;
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.15);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .success { color: #34d399; }
    .error   { color: #f87171; }

    .btn {
      display: none;
      width: 100%;
      padding: 12px;
      margin-top: 16px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(59,130,246,0.3); }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 12C2 6.5 6.5 2 12 2a10 10 0 0 1 8 4"/>
        <path d="M5 19.5C5.5 18 6 15 6 12c0-3.5 2.5-6 6-6 2 0 3.7 1 4.8 2.5"/>
        <path d="M10 12c0 4-1 8-3 10"/>
        <path d="M14 12c0 2.5-.5 5-1.5 7"/>
        <path d="M18 12c0 1-.5 3-1 4.5"/>
        <path d="M22 12a10 10 0 0 1-2 6"/>
        <path d="M10 12a2 2 0 1 1 4 0"/>
      </svg>
    </div>
    <h1>Biometric Unlock</h1>
    <p class="desc">Verify your identity with Touch ID or Windows Hello to unlock the browser.</p>
    <div id="status"><div class="spinner"></div> Waiting for biometric verification…</div>
    <button id="retry-btn" class="btn">Try Again</button>
  </div>

  <script src="auth.js"></script>
</body>
</html>
