<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TouchLock</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <header class="header">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          <circle cx="12" cy="16" r="1"/>
        </svg>
      </div>
      <h1>TouchLock</h1>
    </header>

    <!-- Status -->
    <div id="status-section">
      <div class="status-badge" id="status-badge">
        <span class="dot"></span>
        <span class="label">Checking…</span>
      </div>
    </div>

    <!-- Not configured -->
    <div id="setup-needed" class="section hidden">
      <p class="muted">Extension is not configured yet.</p>
      <button id="btn-setup" class="btn btn-primary">Open Setup</button>
    </div>

    <!-- Actions (when configured) -->
    <div id="actions" class="section hidden">
      <button id="btn-lock" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        Lock Now
      </button>
      <button id="btn-settings" class="btn btn-ghost">Settings</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
