<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TouchLock – Fingerprint Browser Lock</title>
  <link rel="stylesheet" href="lock.css">
</head>
<body>
  <div class="lock-screen">
    <div class="card">
      <div class="icon">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          <circle cx="12" cy="16" r="1"/>
        </svg>
      </div>
      <h1 class="title">Browser Locked</h1>
      <p class="subtitle" id="subtitle">Enter your 6-digit PIN or use biometrics to unlock</p>

      <!-- Biometric auto-trigger status -->
      <div class="bio-status" id="bio-auto-status" style="display:none">
        <div class="spinner"></div>
        <span>Waiting for biometric verification…</span>
      </div>

      <!-- PIN input -->
      <div class="pin-section" id="pin-section">
        <div class="pin-dots" id="pin-dots">
          <span></span><span></span><span></span><span></span><span></span><span></span>
        </div>
        <input type="password" id="pin-input" class="pin-input"
               maxlength="6" inputmode="numeric" pattern="[0-9]*"
               placeholder="••••••" autocomplete="off" />

        <div class="error" id="error"></div>

        <button id="btn-pin" class="btn btn-primary">Unlock with PIN</button>

        <div class="divider"><span>or</span></div>

        <button id="btn-bio" class="btn btn-secondary">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 12C2 6.5 6.5 2 12 2a10 10 0 0 1 8 4"/>
            <path d="M5 19.5C5.5 18 6 15 6 12c0-3.5 2.5-6 6-6 2 0 3.7 1 4.8 2.5"/>
            <path d="M10 12c0 4-1 8-3 10"/>
            <path d="M14 12c0 2.5-.5 5-1.5 7"/>
            <path d="M18 12c0 1-.5 3-1 4.5"/>
            <path d="M22 12a10 10 0 0 1-2 6"/>
            <path d="M10 12a2 2 0 1 1 4 0"/>
          </svg>
          Unlock with Biometrics
        </button>
      </div>

      <a href="recovery.html" class="forgot-link" id="forgot-link">Forgot PIN?</a>

      <p class="footer">TouchLock – Fingerprint Browser Lock</p>
    </div>
  </div>

  <script src="lock.js"></script>
</body>
</html>
